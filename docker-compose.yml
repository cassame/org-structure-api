services:
  db:
    image: postgres:15-alpine
    container_name: org_structure_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: org_structure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_structure"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: org_structure_api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "host=db user=postgres password=postgres dbname=org_structure port=5432 sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: